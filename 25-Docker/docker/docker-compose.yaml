services:
  app:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: app-docker
    restart: always
    working_dir: /var/www
    volumes:
      - ../src:/var/www
  nginx:
    image: nginx:1.31.1-alpine
    container_name: app-nginx
    restart: always
    ports:
      - 8000:80
    volumes:
      - ../src:/var/www
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf